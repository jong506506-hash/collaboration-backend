# Service name shown in logs and actuator-style metadata.
spring.application.name=collaboration-backend

# Run on a different port so this app never collides with the housing prediction backend.
# Deployment platforms can override this with PORT automatically.
server.port=${PORT:8082}

# Use a file-based H2 database so locally entered data survives app restarts on this machine.
# A deployed environment can switch to PostgreSQL just by setting the DATABASE_* variables.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/collaboration-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# The schema lives in schema.sql so table intent stays visible in version control.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# Handy while building the admin-style screens locally.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# Comma-separated frontend origins can be supplied via CORS_ALLOWED_ORIGINS in deployed environments.
